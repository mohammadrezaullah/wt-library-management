<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library System</title>

    <style>
        body { font-family: Arial; margin: 40px; background: #f4f6f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input { padding: 10px; margin: 5px; width: 45%; }
        button { padding: 10px; background: blue; color: white; border: none; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        .available { background: green; color: white; padding: 5px; }
        .borrowed { background: red; color: white; padding: 5px; }
    </style>
</head>

<body>
<div class="container">
    <h2>📚 Library System</h2>

    <!-- Add Book -->
    <input type="text" id="title" placeholder="Title">
    <input type="text" id="author" placeholder="Author"><br><br>
    <br> <button onclick="addBook()">Add</button>

    <!-- Search -->
    <br><br>
    <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterBooks()">

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="bookTableBody"></tbody>
    </table>
</div>

<script src="project.js"></script>
</body>
</html>
